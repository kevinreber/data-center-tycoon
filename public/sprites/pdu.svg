<svg xmlns="http://www.w3.org/2000/svg" width="40" height="28" viewBox="0 0 40 28">
  <!-- Isometric PDU (Power Distribution Unit) - yellow/amber accent -->
  <!-- Left face -->
  <polygon points="4,14 20,22 20,26 4,18" fill="#282008" stroke="#ffcc00" stroke-width="0.3" opacity="0.9"/>
  <!-- Right face -->
  <polygon points="36,14 20,22 20,26 36,18" fill="#302808" stroke="#ffcc00" stroke-width="0.3" opacity="0.9"/>
  <!-- Top face -->
  <polygon points="20,4 36,14 20,22 4,14" fill="#383010" stroke="#ffcc00" stroke-width="0.4" opacity="0.9"/>

  <!-- Circuit breaker toggles on right face -->
  <rect x="22" y="16" width="2" height="1.5" rx="0.3" fill="#ffcc00" opacity="0.5"/>
  <rect x="25" y="16" width="2" height="1.5" rx="0.3" fill="#ffcc00" opacity="0.5"/>
  <rect x="28" y="16" width="2" height="1.5" rx="0.3" fill="#ffcc00" opacity="0.4"/>
  <rect x="31" y="16" width="2" height="1.5" rx="0.3" fill="#ffcc00" opacity="0.4"/>

  <!-- Amperage display -->
  <rect x="22" y="18" width="8" height="2" rx="0.5" fill="#1a1800" stroke="#ffcc00" stroke-width="0.2" opacity="0.6"/>

  <!-- Power cables on left face -->
  <line x1="8" y1="15" x2="8" y2="18" stroke="#ffcc00" stroke-width="0.5" opacity="0.4"/>
  <line x1="12" y1="16" x2="12" y2="19" stroke="#ffcc00" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="17" x2="16" y2="20" stroke="#ffcc00" stroke-width="0.5" opacity="0.4"/>

  <!-- Status LED -->
  <circle cx="22" cy="15" r="0.7" fill="#00ff88" opacity="0.9"/>

  <!-- Warning triangle on top -->
  <polygon points="20,10 22,14 18,14" fill="none" stroke="#ffcc00" stroke-width="0.4" opacity="0.4"/>
  <line x1="20" y1="11" x2="20" y2="13" stroke="#ffcc00" stroke-width="0.3" opacity="0.4"/>
</svg>