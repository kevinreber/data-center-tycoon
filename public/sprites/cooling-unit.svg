<svg xmlns="http://www.w3.org/2000/svg" width="48" height="40" viewBox="0 0 48 40">
  <!-- Isometric CRAC/cooling unit - blue/teal accent -->
  <!-- Left face -->
  <polygon points="4,20 24,30 24,38 4,28" fill="#0a2030" stroke="#00ccff" stroke-width="0.4" opacity="0.9"/>
  <!-- Right face -->
  <polygon points="44,20 24,30 24,38 44,28" fill="#0c2838" stroke="#00ccff" stroke-width="0.4" opacity="0.9"/>
  <!-- Top face -->
  <polygon points="24,8 44,20 24,30 4,20" fill="#0e3040" stroke="#00ccff" stroke-width="0.4" opacity="0.9"/>

  <!-- Fan on top -->
  <ellipse cx="24" cy="19" rx="8" ry="4" fill="none" stroke="#00ccff" stroke-width="0.5" opacity="0.6"/>
  <ellipse cx="24" cy="19" rx="5" ry="2.5" fill="none" stroke="#00ccff" stroke-width="0.3" opacity="0.4"/>
  <ellipse cx="24" cy="19" rx="2" ry="1" fill="#00ccff" opacity="0.3"/>

  <!-- Fan blades (rotated cross) -->
  <line x1="20" y1="17.5" x2="28" y2="20.5" stroke="#00ccff" stroke-width="0.5" opacity="0.4"/>
  <line x1="22" y1="21" x2="26" y2="17" stroke="#00ccff" stroke-width="0.5" opacity="0.4"/>

  <!-- Ventilation grille on right face -->
  <line x1="28" y1="23" x2="40" y2="23" stroke="#083040" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="25" x2="40" y2="25" stroke="#083040" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="27" x2="40" y2="27" stroke="#083040" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="29" x2="40" y2="29" stroke="#083040" stroke-width="0.8" opacity="0.5"/>

  <!-- Pipe connections on left face -->
  <circle cx="10" cy="24" r="1.5" fill="#00ccff" opacity="0.3" stroke="#00ccff" stroke-width="0.3"/>
  <circle cx="10" cy="27" r="1.5" fill="#0088cc" opacity="0.3" stroke="#0088cc" stroke-width="0.3"/>

  <!-- Status LED -->
  <circle cx="28" cy="22" r="0.8" fill="#00ff88" opacity="0.9"/>

  <!-- Coolant flow indicator -->
  <path d="M8,25 Q12,23 16,25" fill="none" stroke="#00ccff" stroke-width="0.3" opacity="0.5"/>
</svg>