<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <!-- Isometric spine/backbone switch - bright orange base for tinting -->
  <!-- Left face -->
  <polygon points="4,16 32,26 32,30 4,20" fill="#cc9966" stroke="#ddaa77" stroke-width="0.4"/>
  <!-- Right face -->
  <polygon points="60,16 32,26 32,30 60,20" fill="#ddaa77" stroke="#eebb88" stroke-width="0.4"/>
  <!-- Top face -->
  <polygon points="32,4 60,16 32,26 4,16" fill="#eebb88" stroke="#ffcc99" stroke-width="0.4"/>

  <!-- High-density port array on right face - row 1 -->
  <circle cx="36" cy="21.5" r="0.7" fill="#ffddaa" opacity="0.8"/>
  <circle cx="38" cy="21.5" r="0.7" fill="#ffddaa" opacity="0.8"/>
  <circle cx="40" cy="21.5" r="0.7" fill="#ffddaa" opacity="0.8"/>
  <circle cx="42" cy="21.5" r="0.7" fill="#ffddaa" opacity="0.8"/>
  <circle cx="44" cy="21.5" r="0.7" fill="#ffeebb" opacity="0.85"/>
  <circle cx="46" cy="21.5" r="0.7" fill="#ffeebb" opacity="0.85"/>
  <circle cx="48" cy="21.5" r="0.7" fill="#ffeecc" opacity="0.9"/>
  <circle cx="50" cy="21.5" r="0.7" fill="#ffeecc" opacity="0.9"/>

  <!-- Row 2 of ports -->
  <circle cx="36" cy="23.5" r="0.7" fill="#ddaa77" opacity="0.6"/>
  <circle cx="38" cy="23.5" r="0.7" fill="#ddaa77" opacity="0.6"/>
  <circle cx="40" cy="23.5" r="0.7" fill="#ddaa77" opacity="0.6"/>
  <circle cx="42" cy="23.5" r="0.7" fill="#ddaa77" opacity="0.6"/>
  <circle cx="44" cy="23.5" r="0.7" fill="#ddaa77" opacity="0.6"/>
  <circle cx="46" cy="23.5" r="0.7" fill="#ddaa77" opacity="0.6"/>
  <circle cx="48" cy="23.5" r="0.7" fill="#ddaa77" opacity="0.6"/>
  <circle cx="50" cy="23.5" r="0.7" fill="#ddaa77" opacity="0.6"/>

  <!-- Power/status LED -->
  <circle cx="35" cy="22.5" r="0.9" fill="#aaffaa" opacity="0.9"/>

  <!-- Top surface heatsink fins -->
  <line x1="12" y1="12" x2="26" y2="18" stroke="#ffcc99" stroke-width="0.5" opacity="0.35"/>
  <line x1="16" y1="11" x2="30" y2="17" stroke="#ffcc99" stroke-width="0.5" opacity="0.35"/>
  <line x1="20" y1="10" x2="34" y2="16" stroke="#ffcc99" stroke-width="0.5" opacity="0.35"/>
  <line x1="24" y1="9" x2="38" y2="15" stroke="#ffcc99" stroke-width="0.5" opacity="0.35"/>
  <line x1="28" y1="8" x2="42" y2="14" stroke="#ffcc99" stroke-width="0.5" opacity="0.35"/>
  <line x1="32" y1="7" x2="46" y2="13" stroke="#ffcc99" stroke-width="0.5" opacity="0.3"/>
  <line x1="36" y1="8" x2="50" y2="14" stroke="#ffcc99" stroke-width="0.5" opacity="0.25"/>

  <!-- Fan grilles on left face -->
  <circle cx="14" cy="18" r="2.5" fill="none" stroke="#aa8855" stroke-width="0.6" opacity="0.5"/>
  <circle cx="14" cy="18" r="1" fill="none" stroke="#aa8855" stroke-width="0.3" opacity="0.4"/>
  <circle cx="24" cy="18.5" r="2.5" fill="none" stroke="#aa8855" stroke-width="0.6" opacity="0.5"/>
  <circle cx="24" cy="18.5" r="1" fill="none" stroke="#aa8855" stroke-width="0.3" opacity="0.4"/>

  <!-- Model label area on top -->
  <rect x="10" y="12" width="10" height="3" rx="0.5" fill="#ffddaa" opacity="0.2"/>
</svg>