<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <!-- Isometric spine/backbone switch - orange accent, larger than leaf -->
  <!-- Left face -->
  <polygon points="4,16 32,26 32,30 4,20" fill="#301808" stroke="#ff6644" stroke-width="0.4" opacity="0.9"/>
  <!-- Right face -->
  <polygon points="60,16 32,26 32,30 60,20" fill="#382010" stroke="#ff6644" stroke-width="0.4" opacity="0.9"/>
  <!-- Top face -->
  <polygon points="32,4 60,16 32,26 4,16" fill="#402810" stroke="#ff6644" stroke-width="0.4" opacity="0.9"/>

  <!-- High-density port array on right face -->
  <circle cx="36" cy="21" r="0.6" fill="#ff6644" opacity="0.7"/>
  <circle cx="38" cy="21" r="0.6" fill="#ff6644" opacity="0.7"/>
  <circle cx="40" cy="21" r="0.6" fill="#ff6644" opacity="0.7"/>
  <circle cx="42" cy="21" r="0.6" fill="#ff6644" opacity="0.7"/>
  <circle cx="44" cy="21" r="0.6" fill="#ff8866" opacity="0.8"/>
  <circle cx="46" cy="21" r="0.6" fill="#ff8866" opacity="0.8"/>
  <circle cx="48" cy="21" r="0.6" fill="#ffaa88" opacity="0.9"/>
  <circle cx="50" cy="21" r="0.6" fill="#ffaa88" opacity="0.9"/>

  <!-- Second row of ports -->
  <circle cx="36" cy="23" r="0.6" fill="#ff6644" opacity="0.5"/>
  <circle cx="38" cy="23" r="0.6" fill="#ff6644" opacity="0.5"/>
  <circle cx="40" cy="23" r="0.6" fill="#ff6644" opacity="0.5"/>
  <circle cx="42" cy="23" r="0.6" fill="#ff6644" opacity="0.5"/>
  <circle cx="44" cy="23" r="0.6" fill="#ff6644" opacity="0.5"/>
  <circle cx="46" cy="23" r="0.6" fill="#ff6644" opacity="0.5"/>
  <circle cx="48" cy="23" r="0.6" fill="#ff6644" opacity="0.5"/>
  <circle cx="50" cy="23" r="0.6" fill="#ff6644" opacity="0.5"/>

  <!-- Power/status LEDs -->
  <circle cx="35" cy="22" r="0.8" fill="#00ff88" opacity="0.9"/>

  <!-- Top surface heatsink -->
  <line x1="14" y1="12" x2="28" y2="18" stroke="#ff6644" stroke-width="0.3" opacity="0.2"/>
  <line x1="18" y1="11" x2="32" y2="17" stroke="#ff6644" stroke-width="0.3" opacity="0.2"/>
  <line x1="22" y1="10" x2="36" y2="16" stroke="#ff6644" stroke-width="0.3" opacity="0.2"/>
  <line x1="26" y1="9" x2="40" y2="15" stroke="#ff6644" stroke-width="0.3" opacity="0.2"/>
  <line x1="30" y1="8" x2="44" y2="14" stroke="#ff6644" stroke-width="0.3" opacity="0.2"/>
  <line x1="34" y1="7" x2="48" y2="13" stroke="#ff6644" stroke-width="0.3" opacity="0.2"/>

  <!-- Fan grille on left face -->
  <circle cx="14" cy="18" r="2" fill="none" stroke="#1a0800" stroke-width="0.5" opacity="0.5"/>
  <circle cx="22" cy="18" r="2" fill="none" stroke="#1a0800" stroke-width="0.5" opacity="0.5"/>

  <!-- Label area on top -->
  <rect x="10" y="12" width="8" height="3" rx="0.5" fill="#ff6644" opacity="0.15"/>
</svg>