<svg xmlns="http://www.w3.org/2000/svg" width="48" height="16" viewBox="0 0 48 16">
  <!-- Isometric 1U/2U server blade - fits inside cabinet -->
  <!-- Left face -->
  <polygon points="2,8 24,14 24,16 2,10" fill="#0a3020" stroke="#00ff88" stroke-width="0.3" opacity="0.9"/>
  <!-- Right face -->
  <polygon points="46,8 24,14 24,16 46,10" fill="#0d4028" stroke="#00ff88" stroke-width="0.3" opacity="0.9"/>
  <!-- Top face -->
  <polygon points="24,2 46,8 24,14 2,8" fill="#105030" stroke="#00ff88" stroke-width="0.3" opacity="0.9"/>

  <!-- Drive bays on right face -->
  <rect x="28" y="9" width="3" height="2" rx="0.3" fill="#083018" stroke="#00ff88" stroke-width="0.2" opacity="0.6"/>
  <rect x="32" y="9" width="3" height="2" rx="0.3" fill="#083018" stroke="#00ff88" stroke-width="0.2" opacity="0.6"/>
  <rect x="36" y="9" width="3" height="2" rx="0.3" fill="#083018" stroke="#00ff88" stroke-width="0.2" opacity="0.6"/>
  <rect x="40" y="9" width="3" height="2" rx="0.3" fill="#083018" stroke="#00ff88" stroke-width="0.2" opacity="0.6"/>

  <!-- Power LED -->
  <circle cx="27" cy="10" r="0.8" fill="#00ff88" opacity="0.9"/>
  <!-- Activity LED -->
  <circle cx="29" cy="10" r="0.6" fill="#ffcc00" opacity="0.7"/>

  <!-- Top panel detail - heatsink lines -->
  <line x1="12" y1="6" x2="20" y2="9" stroke="#00ff88" stroke-width="0.2" opacity="0.3"/>
  <line x1="16" y1="5" x2="24" y2="8" stroke="#00ff88" stroke-width="0.2" opacity="0.3"/>
  <line x1="20" y1="4" x2="28" y2="7" stroke="#00ff88" stroke-width="0.2" opacity="0.3"/>
  <line x1="24" y1="3" x2="32" y2="6" stroke="#00ff88" stroke-width="0.2" opacity="0.3"/>
  <line x1="28" y1="4" x2="36" y2="7" stroke="#00ff88" stroke-width="0.2" opacity="0.3"/>
</svg>