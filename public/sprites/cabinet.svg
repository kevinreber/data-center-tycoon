<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Isometric server cabinet/rack - dark metal with neon accents -->
  <!-- Left face (darker) -->
  <polygon points="4,48 32,64 32,92 4,76" fill="#2a3340" stroke="#3d4d5d" stroke-width="0.5"/>
  <!-- Right face (slightly lighter) -->
  <polygon points="60,48 32,64 32,92 60,76" fill="#344050" stroke="#3d4d5d" stroke-width="0.5"/>
  <!-- Top face -->
  <polygon points="32,32 60,48 32,64 4,48" fill="#4a5a6a" stroke="#556677" stroke-width="0.5"/>

  <!-- Ventilation slots on left face -->
  <line x1="10" y1="54" x2="28" y2="63" stroke="#1a2530" stroke-width="1" opacity="0.6"/>
  <line x1="10" y1="58" x2="28" y2="67" stroke="#1a2530" stroke-width="1" opacity="0.6"/>
  <line x1="10" y1="62" x2="28" y2="71" stroke="#1a2530" stroke-width="1" opacity="0.6"/>

  <!-- Front panel detail on right face - rack rails -->
  <line x1="38" y1="52" x2="38" y2="74" stroke="#556677" stroke-width="0.5" opacity="0.5"/>
  <line x1="54" y1="52" x2="54" y2="74" stroke="#556677" stroke-width="0.5" opacity="0.5"/>

  <!-- U-slots (horizontal lines representing rack units) -->
  <line x1="39" y1="54" x2="53" y2="54" stroke="#1a2530" stroke-width="0.8" opacity="0.4"/>
  <line x1="39" y1="57" x2="53" y2="57" stroke="#1a2530" stroke-width="0.8" opacity="0.4"/>
  <line x1="39" y1="60" x2="53" y2="60" stroke="#1a2530" stroke-width="0.8" opacity="0.4"/>
  <line x1="39" y1="63" x2="53" y2="63" stroke="#1a2530" stroke-width="0.8" opacity="0.4"/>
  <line x1="39" y1="66" x2="53" y2="66" stroke="#1a2530" stroke-width="0.8" opacity="0.4"/>
  <line x1="39" y1="69" x2="53" y2="69" stroke="#1a2530" stroke-width="0.8" opacity="0.4"/>
  <line x1="39" y1="72" x2="53" y2="72" stroke="#1a2530" stroke-width="0.8" opacity="0.4"/>

  <!-- Top panel vents -->
  <line x1="18" y1="42" x2="32" y2="50" stroke="#3d4d5d" stroke-width="0.5" opacity="0.5"/>
  <line x1="22" y1="40" x2="36" y2="48" stroke="#3d4d5d" stroke-width="0.5" opacity="0.5"/>
  <line x1="26" y1="38" x2="40" y2="46" stroke="#3d4d5d" stroke-width="0.5" opacity="0.5"/>

  <!-- Bottom feet/base -->
  <rect x="8" y="76" width="4" height="2" rx="0.5" fill="#1a2530" opacity="0.7"/>
  <rect x="52" y="76" width="4" height="2" rx="0.5" fill="#1a2530" opacity="0.7"/>
</svg>