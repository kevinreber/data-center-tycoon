<svg xmlns="http://www.w3.org/2000/svg" width="48" height="12" viewBox="0 0 48 12">
  <!-- Isometric leaf/ToR switch - cyan accent -->
  <!-- Left face -->
  <polygon points="2,6 24,10 24,12 2,8" fill="#082838" stroke="#00aaff" stroke-width="0.3" opacity="0.9"/>
  <!-- Right face -->
  <polygon points="46,6 24,10 24,12 46,8" fill="#0a3040" stroke="#00aaff" stroke-width="0.3" opacity="0.9"/>
  <!-- Top face -->
  <polygon points="24,0 46,6 24,10 2,6" fill="#0c3848" stroke="#00aaff" stroke-width="0.4" opacity="0.9"/>

  <!-- Port indicators on right face -->
  <circle cx="28" cy="8" r="0.5" fill="#00aaff" opacity="0.8"/>
  <circle cx="30" cy="8" r="0.5" fill="#00aaff" opacity="0.8"/>
  <circle cx="32" cy="8" r="0.5" fill="#00aaff" opacity="0.6"/>
  <circle cx="34" cy="8" r="0.5" fill="#00aaff" opacity="0.6"/>
  <circle cx="36" cy="8" r="0.5" fill="#00aaff" opacity="0.5"/>
  <circle cx="38" cy="8" r="0.5" fill="#00aaff" opacity="0.5"/>
  <circle cx="40" cy="8" r="0.5" fill="#00ddff" opacity="0.9"/>
  <circle cx="42" cy="8" r="0.5" fill="#00ddff" opacity="0.9"/>

  <!-- Uplink indicator on top face -->
  <circle cx="38" cy="4" r="0.7" fill="#00ddff" opacity="0.8"/>
  <circle cx="40" cy="5" r="0.7" fill="#00ddff" opacity="0.8"/>

  <!-- Status LED -->
  <circle cx="27" cy="8" r="0.6" fill="#00ff88" opacity="0.9"/>

  <!-- Top surface detail lines -->
  <line x1="10" y1="4" x2="22" y2="8" stroke="#00aaff" stroke-width="0.2" opacity="0.25"/>
  <line x1="14" y1="3" x2="26" y2="7" stroke="#00aaff" stroke-width="0.2" opacity="0.25"/>
</svg>