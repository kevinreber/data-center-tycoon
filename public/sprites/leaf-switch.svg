<svg xmlns="http://www.w3.org/2000/svg" width="48" height="12" viewBox="0 0 48 12">
  <!-- Isometric leaf/ToR switch - bright cyan base for tinting -->
  <!-- Left face -->
  <polygon points="2,6 24,10 24,12 2,8" fill="#77bbdd" stroke="#88ccee" stroke-width="0.3"/>
  <!-- Right face -->
  <polygon points="46,6 24,10 24,12 46,8" fill="#88ccee" stroke="#99ddff" stroke-width="0.3"/>
  <!-- Top face -->
  <polygon points="24,0 46,6 24,10 2,6" fill="#99ddff" stroke="#aaeeff" stroke-width="0.4"/>

  <!-- Port indicators on right face -->
  <circle cx="28" cy="8.5" r="0.6" fill="#ddeeff" opacity="0.9"/>
  <circle cx="30" cy="8.5" r="0.6" fill="#ddeeff" opacity="0.9"/>
  <circle cx="32" cy="8.5" r="0.6" fill="#ddeeff" opacity="0.8"/>
  <circle cx="34" cy="8.5" r="0.6" fill="#ddeeff" opacity="0.8"/>
  <circle cx="36" cy="8.5" r="0.6" fill="#ccddef" opacity="0.7"/>
  <circle cx="38" cy="8.5" r="0.6" fill="#ccddef" opacity="0.7"/>
  <circle cx="40" cy="8.5" r="0.6" fill="#eeffff" opacity="0.95"/>
  <circle cx="42" cy="8.5" r="0.6" fill="#eeffff" opacity="0.95"/>

  <!-- Uplink on top face -->
  <circle cx="38" cy="4" r="0.8" fill="#eeffff" opacity="0.8"/>
  <circle cx="40" cy="5" r="0.8" fill="#eeffff" opacity="0.8"/>

  <!-- Status LED -->
  <circle cx="27" cy="8.5" r="0.7" fill="#aaffaa" opacity="0.95"/>

  <!-- Top surface lines -->
  <line x1="10" y1="4" x2="22" y2="8" stroke="#aaeeff" stroke-width="0.3" opacity="0.3"/>
  <line x1="14" y1="3" x2="26" y2="7" stroke="#aaeeff" stroke-width="0.3" opacity="0.3"/>
</svg>